services:
  postgres:
    image: postgres:16-alpine
    container_name: bestduo-postgres
    environment:
      POSTGRES_DB: bestduo
      POSTGRES_USER: bestduo
      POSTGRES_PASSWORD: bestduo
    ports:
      - "5432:5432"
    volumes:
      - bestduo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bestduo"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bestduo-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bestduo
      DB_USERNAME: bestduo
      DB_PASSWORD: bestduo
      RIOT_API_KEYS: ${RIOT_API_KEYS}
    restart: unless-stopped

volumes:
  bestduo-pgdata:
