services:
  postgres:
    image: postgres:16-alpine
    container_name: bestduo-postgres
    environment:
      POSTGRES_DB: bestduo
      POSTGRES_USER: bestduo
      POSTGRES_PASSWORD: bestduo
    ports:
      - "5432:5432"
    volumes:
      - bestduo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bestduo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bestduo-pgdata:
