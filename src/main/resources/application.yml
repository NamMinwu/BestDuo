spring:
  application:
    name: bestduo

  datasource:
    url: jdbc:postgresql://localhost:5432/bestduo
    username: ${DB_USERNAME:bestduo}
    password: ${DB_PASSWORD:bestduo}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  batch:
    job:
      enabled: false  # Job 자동 실행 비활성화 (스케줄러 또는 수동 트리거)
    jdbc:
      initialize-schema: always

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/docs/swagger-ui

# Riot API 설정
riot:
  api:
    keys: ${RIOT_API_KEYS}  # 콤마 구분 복수 키: key1,key2,key3
    rate-limit-per-second: 0.7  # per key (100 req/2min의 85%)
    base-url: https://kr.api.riotgames.com
    match-base-url: https://asia.api.riotgames.com

# 랭킹 알고리즘 설정 (Phase 0 후 실제 데이터로 조정)
ranking:
  min-sample-games: 30
  score-weights:
    wilson: 0.7
    pick-rate: 0.3
  tier-thresholds:  # Phase 0 실제 score 분포 확인 후 조정 필수
    s: 0.56
    a: 0.52
    b: 0.49
    c: 0.46

# 패치 감지 스케줄 (15분마다)
scheduler:
  patch-detection:
    cron: "0 */15 * * * *"

logging:
  level:
    com.bestduo: INFO
    org.springframework.batch: WARN
